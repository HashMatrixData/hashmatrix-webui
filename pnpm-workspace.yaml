packages:
  - 'packages/*'
allowBuilds:
  '@swc/core': true
  esbuild: true
  msw: true
  unrs-resolver: true
# ProComponents 仅声明 antd ^4||^5 peer，但平台选定 antd v6（见 docs/00-前端初始化-spec.md）。
# 强制全仓 antd 收敛 v6，并放行该 peer 版本以消除告警。运行期兼容由 typecheck + E2E 把关。
overrides:
  antd: ^6.4.4
peerDependencyRules:
  allowedVersions:
    antd: '6'
minimumReleaseAgeExclude:
  - '@storybook/builder-vite@10.4.6'
  - '@storybook/csf-plugin@10.4.6'
  - '@storybook/react-dom-shim@10.4.6'
  - '@storybook/react-vite@10.4.6'
  - '@storybook/react@10.4.6'
  - eslint-plugin-storybook@10.4.6
  - react-router-dom@7.18.0
  - react-router@7.18.0
  - storybook@10.4.6
